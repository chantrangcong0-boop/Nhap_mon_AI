<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bangkok Precision Routing — User Map</title>
  <meta name="description" content="Multi-modal A* routing for Bangkok: walk, drive, BTS Skytrain and MRT Metro."/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="app-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="header">
      <h1>🗺 Bangkok Precision Routing</h1>
      <p>Multi-modal A* • OpenStreetMap • Real geometry</p>
      <div class="header-links">
        <a href="/" class="active">User Map</a>
        <a href="/admin">Admin Panel</a>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting to server…</span>
    </div>

    <!-- Coordinates input -->
    <div class="section">
      <div class="section-title">Waypoints</div>

      <div class="input-group">
        <label>Start Point</label>
        <div class="input-row">
          <div>
            <label>Latitude</label>
            <input type="number" id="startLat" placeholder="13.7455" step="0.0001" value="13.7455"/>
          </div>
          <div>
            <label>Longitude</label>
            <input type="number" id="startLng" placeholder="100.5340" step="0.0001" value="100.5340"/>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>End Point</label>
        <div class="input-row">
          <div>
            <label>Latitude</label>
            <input type="number" id="endLat" placeholder="13.7312" step="0.0001" value="13.7312"/>
          </div>
          <div>
            <label>Longitude</label>
            <input type="number" id="endLng" placeholder="100.5273" step="0.0001" value="100.5273"/>
          </div>
        </div>
      </div>

      <div class="click-instruction" id="clickInstruction">
        🖱 Click map to set <strong id="clickTarget">Start</strong> point
      </div>
    </div>

    <!-- Transport mode -->
    <div class="section">
      <div class="section-title">Transport Mode</div>
      <div class="mode-pills" style="margin-bottom:12px;">
        <button class="mode-pill active" data-mode="multimodal">🚇 Đi Tàu & Đi Bộ</button>
        <button class="mode-pill" data-mode="walk">🚶 Chỉ Đi bộ (Walk)</button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="section">
      <button class="btn btn-primary" id="btnRoute" disabled>
        <span id="btnRouteLabel">Find Route</span>
      </button>
      <div style="height:8px;"></div>
      <button class="btn btn-ghost btn-sm" id="btnClear" style="width:100%">Clear</button>
    </div>

    <!-- Result -->
    <div id="resultSection" style="display:none;">
      <div class="result-panel">
        <div class="section-title">Route Info</div>
        <div class="stat-row">
          <span class="stat-label">Total Distance</span>
          <span class="stat-value" id="resDist">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Estimated Time</span>
          <span class="stat-value" id="resTime">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Waypoints</span>
          <span class="stat-value" id="resPoints">—</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Segments</div>
        <div class="segments-list" id="segmentsList"></div>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend" style="margin-top:auto;">
      <div class="legend-item">
        <div class="legend-line" style="background:#3b82f6;"></div> Walk
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#f97316;"></div> Drive
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#a855f7;"></div> Rail
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#14b8a6;"></div> Transfer
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#ef4444;"></div> Blocked
      </div>
    </div>
  </aside>

  <!-- ── Map ── -->
  <div id="map"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/js/user_map.js?v=4"></script>
</body>
</html>
